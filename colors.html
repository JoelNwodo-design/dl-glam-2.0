<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="color.css" />
  </head>
  <body>
    <main class="color-box">
      <div class="test" id="bg-dark">bg dark</div>
      <div class="test" id="bg">bg</div>
      <div class="test" id="bg-light">bg light</div>
      <div class="test" id="border">border</div>
      <div class="test" id="primaryText">primary text</div>
      <div class="test" id="secondaryText">secondary text</div>
      <div class="test" id="tertiaryText">tertiary text</div>
      <div class="test" id="primaryColor">primary color</div>
      <div class="test" id="secondaryColor">secondary color</div>
      <div class="test" id="accentColor">accent color</div>
      <div class="test" id="danger">danger</div>
      <div class="test" id="warning">warning</div>
      <div class="test" id="success">success</div>
      <div class="test" id="info">info</div>
    </main>

    <main class="text-box">
      <h1>Main or Heading text</h1>
      <h2>Section heading or Sub-heading text</h2>
      <h3>Lead or Intro-text</h3>
      <p>Information or body text</p>
      <p class="label-text">Label text</p>
    </main>

    <a href="index.html">
      <button>Go back</button>
    </a>
  </body>
</html>
